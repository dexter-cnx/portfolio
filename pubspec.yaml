name: flutter_web_portfolio_starter
publish_to: 'none'
description: Flutter Web portfolio starter
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  easy_localization: ^3.0.7
  easy_localization_loader: ^2.0.2
  url_launcher: ^6.3.1
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.5
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0



flutter:
  uses-material-design: true
  assets:
    - assets/content/portfolio_content_en.json
    - assets/content/portfolio_content_th.json
    - assets/translations/
    - assets/images/
    - assets/pdf/



